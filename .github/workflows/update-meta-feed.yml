name: Update Meta catalogue feed

on:
  # Runs four times per day in UTC. This is approximately 6am, midday, 6pm, and midnight
  # in Australia/Sydney during standard time, and one hour later during daylight saving.
  schedule:
    - cron: "0 20,2,8,14 * * *"

  # Lets you click a button in GitHub to run it immediately.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python requirements
        run: pip install -r requirements.txt

      - name: Generate Meta catalogue feed
        env:
          HOMHERO_API_KEY: ${{ secrets.HOMHERO_API_KEY }}
          BOOKING_BASE_URL: "https://snowymountainsaccommodation.au/accommodation/{slug}/"
          BRAND_NAME: "Snowy Mountains Accommodation"
          # Meta requires price as amount + ISO currency, e.g. "308.00 AUD".
          # If Commerce Manager reports a shopfront currency mismatch, set repository variable
          # META_FEED_CURRENCY to the shopfront's exact currency code, then rerun this workflow.
          META_FEED_CURRENCY: ${{ vars.META_FEED_CURRENCY || 'AUD' }}
          # Pricing hierarchy:
          # 1) use Homhero API price fields when available;
          # 2) otherwise use optional manual overrides from META_FEED_PRICE_OVERRIDES;
          # 3) otherwise read the public listing page's "From $X /night based on a 7 night stay" value;
          # 4) otherwise use the safe default fallback below.
          META_FEED_FALLBACK_PRICE: ${{ vars.META_FEED_FALLBACK_PRICE || '308.00' }}
          USE_HOMHERO_STARTING_PRICE: ${{ vars.USE_HOMHERO_STARTING_PRICE || 'true' }}
          USE_WEBSITE_FROM_PRICE: ${{ vars.USE_WEBSITE_FROM_PRICE || 'true' }}
          META_FEED_PRICE_OVERRIDES: ${{ vars.META_FEED_PRICE_OVERRIDES || '' }}
          ADD_STARTING_PRICE_TO_DESCRIPTION: ${{ vars.ADD_STARTING_PRICE_TO_DESCRIPTION || 'true' }}
          STARTING_PRICE_LABEL: ${{ vars.STARTING_PRICE_LABEL || 'Rates from AU${amount} per night. Final price depends on dates, guests and availability.' }}
          DEFAULT_QUANTITY: "999"
        run: python generate_meta_feed.py

      - name: Commit updated feed files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Meta catalogue feed"
          file_pattern: docs/*.csv
